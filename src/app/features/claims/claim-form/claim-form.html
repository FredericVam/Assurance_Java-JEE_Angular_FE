<h2>Déclaration de sinistre</h2>

<form style="max-width: 500px;">

  <div style="margin-bottom: 10px;">
    <label>Numéro de contrat :</label><br>
    <input type="text" placeholder="CTR-001" style="width: 100%;">
  </div>

  <div style="margin-bottom: 10px;">
    <label>Date du sinistre :</label><br>
    <input type="date" style="width: 100%;">
  </div>

  <div style="margin-bottom: 10px;">
    <label>Description :</label><br>
    <textarea rows="4" style="width: 100%;"></textarea>
  </div>

  <div style="margin-bottom: 10px;">
    <label>Montant estimé (€) :</label><br>
    <input type="number" style="width: 100%;">
  </div>

  <button type="submit">Déclarer</button>
</form>
